server:
  port: 8000

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/parking-lot
          jwk-set-uri: http://localhost:8080/realms/parking-lot/protocol/openid-connect/certs
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000  # Time to establish connection
        response-timeout: 5s   # Time to wait for the data
      routes:
        # Route for direct Ticket access with Resilience
        - id: ticket-service-route
          uri: lb://ticket-service
          predicates:
            - Path=/api/v1/tickets/** # Match the actual controller path
          filters:
            - name: CircuitBreaker
              args:
                name: ticketServiceCircuitBreaker
                # This must point to a controller inside the Gateway project
                fallbackUri: forward:/fallback/ticket-service
      # This tells the gateway to be flexible with case when talking to Eureka
      discovery:
        locator:
          lower-case-service-id: true

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: TRACE


# Resilience4j Tuning
resilience4j:
  circuitbreaker:
    instances:
      ticketServiceCircuitBreaker:
        slidingWindowSize: 10          # Check the last 10 requests
        failureRateThreshold: 50       # If 5 out of 10 fail, open the circuit
        waitDurationInOpenState: 10s   # Wait 10s before trying again
  timelimiter:
    instances:
      ticketServiceCircuitBreaker: # Note: This MUST match the name used in the route filter
        timeoutDuration: 5s       # Gives the Ticket Service 5s to "wake up"
