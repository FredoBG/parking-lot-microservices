server:
  port: 8081

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # The issuer-uri allows the service to discover the public keys
          # from Keycloak to verify the token signature locally.
          issuer-uri: http://localhost:8080/realms/parking-lot
          jwk-set-uri: http://localhost:8080/realms/parking-lot/protocol/openid-connect/certs
  datasource:
    url: jdbc:h2:mem:parkingdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: "refresh,health,info" # We open refresh for updates, health for monitoring
  endpoint:
    health:
      show-details: always # Helpful for debugging database/kafka connections

# Custom property for your business logic (example)
parking:
  maxSpots: 100
  hourlyRates:
    car: 5.0
    motorcycle: 2.0
    truck: 8.0

resilience4j:
  retry:
    instances:
      kafkaProducer:
        maxAttempts: 3
        waitDuration: 2s # Wait 2 seconds between tries
        retryExceptions:
          - org.apache.kafka.common.errors.TimeoutException
          - org.springframework.kafka.KafkaException
  circuitbreaker:
    instances:
      kafkaProducer:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50 # If 50% of calls fail, "Open" the circuit (stop trying)
        waitDurationInOpenState: 10s
